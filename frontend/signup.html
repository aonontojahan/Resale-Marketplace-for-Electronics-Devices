<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ReSale</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="container">
    <a href="index.html" class="logo">ReSale.</a>
    
    <div class="search-container">
      <input type="text" placeholder="Search for electronics..." class="search-bar">
    </div>

    <nav>
      <!-- Nav links will be injected by app.js -->
    </nav>
  </div>
</header>

<main class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Join ReSale</h1>
    <p class="auth-subtitle">Create an account to start buying and selling.</p>
    
    <div class="role-tabs" id="roleSelector">
      <div class="role-tab active" data-role="buyer">Buyer</div>
      <div class="role-tab" data-role="seller">Seller</div>
      <div class="role-tab" data-role="admin">Admin</div>
    </div>
    <input type="hidden" id="selectedRole" value="buyer">

    <form id="signupForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Aonontojahan" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required>
      </div>
      
      <button type="submit" class="btn-primary" style="width: 100%; padding: 0.85rem;">Create Account</button>
    </form>
    
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
